services:
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "8880:80"
    depends_on:
      - backend
    networks:
      - libtv-network
    restart: always

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
      - DB_HOST=db
      - REDIS_HOST=redis
      - RUN_MODE=docker
      - STORAGE_TYPE=fallback  # MinIO优先，本地降级
      # MinIO配置 - 使用宿主机IP访问
      - MINIO_ENDPOINT=192.168.110.207:9000
      - MINIO_PUBLIC_ENDPOINT=http://39.171.58.10:9990  # MinIO公网访问地址（端口映射）
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - libtv-network
    restart: always
    volumes:
      - uploads-data:/app/uploads
      - public-data:/app/public
    # 使用extra_hosts确保容器能访问宿主机网络
    extra_hosts:
      - "minio-host:192.168.110.207"

  db:
    image: postgres:15-alpine
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      - POSTGRES_DB=libtv
      - POSTGRES_USER=libtv
      - POSTGRES_PASSWORD=libtv123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - libtv-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libtv -d libtv"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - libtv-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  libtv-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  uploads-data:
  public-data:
