server:
  port: 8080
  mode: debug  # debug / release

database:
  host: localhost
  port: 5432
  user: libtv
  password: libtv123
  dbname: libtv
  sslmode: disable

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "libtv-mvp-secret-change-in-production"
  expire_hours: 72

storage:
  type: local  # fallback / minio / local (本地开发使用local)
  local:
    base_path: ./uploads
  minio:
    endpoint: 192.168.110.207:9000  # 内网地址
    access_key: admin
    secret_key: password123
    bucket: libtv
    use_ssl: false
    public_endpoint: http://39.171.58.10:9990  # 公网访问地址（MinIO端口映射）
    check_interval: 30s  # 健康检查间隔
    check_timeout: 3s    # 健康检查超时

ai:
  llm:
    provider: openai  # openai / qwen
    api_key: ""
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o"
  image:
    provider: sd_webui  # sd_webui / comfyui
    api_url: "http://localhost:7860"
  video:
    provider: kling  # kling / seedance
    api_key: ""
    api_url: ""
  audio:
    provider: edge_tts  # edge_tts / fish_speech
